- name: silver_tasy_material
  description: 'Silver - cadastro mestre de materiais/medicamentos (dimensao).

    Fonte: bronze_tasy_material

    Grain: 1 material/medicamento

    Observacao: 85% inativos (IE_SITUACAO=''I''). Filtro IE_SITUACAO=''A'' aplicado em Gold

    Dominio: farmacia

