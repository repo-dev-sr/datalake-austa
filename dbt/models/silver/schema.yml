  columns:
  - name: cd_material
    tests:
    - unique
    - not_null
  - name: ds_material
    tests:
    - not_null
  - name: ie_situacao
    tests:
    - accepted_values:
        values:
        - A
        - I
  - name: ie_tipo_material
    description: 1=Medicamento (89%), 2=Material Hospitalar (7,6%), 3=Dieta, 4=Gasoterapia, 5=Servico, 6=Imobilizado, 0=Outros
    tests:
    - accepted_values:
        values:
        - '0'
        - '1'
        - '2'
        - '3'
        - '4'
        - '5'
        - '6'
        - i
  - name: _silver_processed_at
