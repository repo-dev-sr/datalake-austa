- name: silver_tasy_ap_lote
  description: 'Silver - lotes de dispensacao farmaceutica, deduplicados e sem tombstones.

    Fonte: bronze_tasy_ap_lote

    Grain: 1 lote por turno/setor/prescricao

    Filtros: NOT _is_deleted apos ROW_NUMBER por (_cdc_ts_ms, __source_txid) DESC

    Dominio: farmacia

    '
  columns:
  - name: nr_sequencia
    tests:
    - unique
    - not_null
  - name: nr_prescricao
    tests:
    - not_null
  - name: nr_atendimento
    tests:
    - not_null
  - name: ie_status_lote
    description: Dominio 2116 TASY - 11 valores (G, A, D, E, R, C, CA, S, CO, RP, ERV)
    tests:
    - accepted_values:
        values:
        - G
        - A
        - D
        - E
        - R
        - C
        - CA
        - S
        - CO
        - RP
        - ERV
        - i
  - name: dt_geracao_lote
    tests:
    - not_null
  - name: _silver_processed_at
    tests:
    - not_null
- name: silver_tasy_ap_lote_item
  description: 'Silver - itens dispensados dentro de cada lote, deduplicados e sem tombstones.

    Fonte: bronze_tasy_ap_lote_item

    Grain: 1 medicamento/material dentro de 1 lote

    Tratamentos: QT_DISPENSAR < 0 -> NULL; QT_REAL_DISP > 10000 -> NULL

    Dominio: farmacia

    '
  columns:
  - name: nr_sequencia
    tests:
    - unique
    - not_null
  - name: nr_seq_lote
    tests:
    - not_null
  - name: cd_material
    tests:
    - not_null
  - name: ie_prescrito
    tests:
    - accepted_values:
        values:
        - S
        - N
  - name: ie_urgente
    tests:
    - accepted_values:
        values:
        - S
        - N
  - name: _silver_processed_at
    tests:
    - not_null
