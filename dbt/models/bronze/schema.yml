              values: ['c', 'u', 'd', 'r']
      - name: __ts_ms
        description: "Timestamp CDC em milissegundos"
        tests:
          - not_null
      - name: is_deleted
        description: "Flag de soft delete derivada de __op/__deleted"
      - name: dt_criacao
        description: "Data de inserção no lakehouse"
      - name: dt_atualizacao_lakehouse
        description: "Última atualização no lakehouse"
      - name: fonte_sistema
        description: "Sistema de origem (tasy)"

