# Bronze: Avro (CDC) → Iceberg — documentação e testes.
# Fundido a partir de schema.yml (modelos tasy core) e schema_bronze_generated.yml (austa / UNION).
# Nomes de colunas alinhados ao SELECT (minúsculas). Sem JOINs na bronze.
version: 2

models:
  - name: bronze_tasy_area_procedimento
    description: "Bronze TASY AREA_PROCEDIMENTO (austa) - CDC Oracle via Kafka (stream Avro para Iceberg)."
    columns:
      - name: _cdc_op
        description: "Operação CDC (c=create, u=update, d=delete, r=read)"
        tests:
          - accepted_values:
              values: ["c", "u", "d", "r"]
      - name: _cdc_ts_ms
        description: "Timestamp CDC em ms (campo físico __ts_ms no Avro)"
        tests:
          - not_null
      - name: _is_deleted
        description: "Tombstone CDC (boolean)"
      - name: _source_path
        description: "Caminho S3 raw do stream"

  - name: bronze_tasy_atend_paciente_unidade
    description: "Bronze TASY ATEND_PACIENTE_UNIDADE — CDC do Oracle via Kafka (stream Avro)"
    columns:
      - name: nr_seq_interno
        description: "Chave técnica do atendimento por unidade (unique_key / merge no Iceberg)"
        tests:
          - not_null
          - unique
      - name: _is_deleted
        description: "Tombstone CDC (__deleted = 'true') como BOOLEAN"
      - name: _cdc_op
        description: "Operação CDC (c=create, u=update, d=delete, r=read)"
        tests:
          - accepted_values:
              values: ["c", "u", "d", "r"]
      - name: _cdc_ts_ms
        description: "Timestamp CDC em milissegundos (BIGINT; COALESCE 0)"
        tests:
          - not_null
      - name: _cdc_event_at
        description: "Instante CDC derivado de __ts_ms (segundos → TIMESTAMP)"
      - name: _cdc_source_table
        description: "Tabela de origem informada pelo conector CDC"
      - name: _source_path
        description: "Caminho S3 raw (literal) do stream Avro"
      - name: _row_hash
        description: "MD5 do JSON do STRUCT das colunas negociais (detecção de mudança de conteúdo)"
      - name: _bronze_loaded_at
        description: "Timestamp de carga do registro na camada bronze"

  - name: bronze_tasy_atendimento_paciente
    description: "Bronze TASY ATENDIMENTO_PACIENTE — CDC do Oracle via Kafka (stream Avro)"
    columns:
      - name: nr_atendimento
        description: "Número do atendimento (unique_key / merge no Iceberg)"
        tests:
          - not_null
          - unique
      - name: cd_pessoa_fisica
        description: "Código da pessoa física (paciente)"
      - name: __op
        description: "Operação CDC (c=create, u=update, d=delete)"
        tests:
          - accepted_values:
              values: ["c", "u", "d", "r"]
      - name: __ts_ms
        description: "Timestamp CDC em milissegundos"
        tests:
          - not_null
      - name: __deleted
        description: "Flag CDC de registro removido no origem"
      - name: __source_table
        description: "Tabela de origem informada pelo conector CDC"
      - name: partition_path
        description: "Caminho de partição derivado (raw_path / year / month / day / hour)"
      - name: create_at
        description: "Timestamp de carga no lakehouse (bronze)"
      - name: update_at
        description: "Timestamp usado no ordenamento de deduplicação CDC"
      - name: source
        description: "Sistema de origem (ex. tasy via var fonte_sistema)"

