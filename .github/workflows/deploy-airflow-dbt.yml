name: Deploy Airflow DAGs and dbt

on:
  push:
    branches:
      - main
    paths:
      - "airflow/dags/**"
      - "dbt/**"
      - ".github/workflows/deploy-airflow-dbt.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync DAGs to EC2
        run: |
          rsync -az --delete \
            --exclude "__pycache__/" \
            --exclude "*.pyc" \
            airflow/dags/ \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/austa-dags/"

          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "\
            sudo mkdir -p /opt/airflow/dags && \
            sudo rsync -az --delete /tmp/austa-dags/ /opt/airflow/dags/ && \
            sudo rm -rf /tmp/austa-dags"

      - name: Sync dbt to EC2
        run: |
          rsync -az --delete \
            --exclude "target/" \
            --exclude "logs/" \
            --exclude ".user.yml" \
            --exclude "dbt_packages/" \
            dbt/ \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/austa-dbt/"

          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "\
            sudo mkdir -p /opt/airflow/dbt && \
            sudo rsync -az --delete /tmp/austa-dbt/ /opt/airflow/dbt/ && \
            if [ ! -f /opt/airflow/dbt/profiles.yml ] && [ -f /opt/airflow/dbt/profiles.yml.example ]; then sudo cp /opt/airflow/dbt/profiles.yml.example /opt/airflow/dbt/profiles.yml; fi && \
            sudo rm -rf /tmp/austa-dbt"

      - name: Setup Python for dbt manifest
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate dbt manifest on Linux runner
        run: |
          python -m pip install --upgrade pip
          pip install -r dbt/requirements-dbt.txt
          cp dbt/profiles.yml.example dbt/profiles.yml
          dbt deps --project-dir dbt --profiles-dir dbt --target dev
          dbt parse --project-dir dbt --profiles-dir dbt --target dev

      - name: Sync dbt manifest to EC2
        run: |
          rsync -az \
            dbt/target/manifest.json \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/austa-manifest.json"

          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "\
            sudo mkdir -p /opt/airflow/dbt/target && \
            sudo mv /tmp/austa-manifest.json /opt/airflow/dbt/target/manifest.json && \
            sudo chown 1000:1000 /opt/airflow/dbt/target/manifest.json"

      - name: Validate deployed paths on EC2
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "sudo ls -la /opt/airflow/dags | sed -n '1,30p'; echo; sudo ls -la /opt/airflow/dbt | sed -n '1,30p'; echo; sudo ls -la /opt/airflow/dbt/target/manifest.json"
